name: CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install Dependencies
              run: bun install --frozen-lockfile

            - name: Generate Prisma Client
              run: bun run prisma:generate

            - name: Restore turbo cache
              uses: actions/cache@v4
              with:
                  path: .turbo
                  key: ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-${{ github.sha }}
                  restore-keys: |
                      ${{ runner.os }}-turbo-${{ github.job }}-${{ github.ref_name }}-
                      ${{ runner.os }}-turbo-${{ github.job }}-
                      ${{ runner.os }}-turbo-

            - name: Build Application
              run: bun run build

    docker:
        name: Build & Push Docker Images
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build & Push http-backend
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Docker/http-backend.Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/hackstack-http-backend:${{ github.sha }}
                      ${{ secrets.DOCKERHUB_USERNAME }}/hackstack-http-backend:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build & Push submission-webhook
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Docker/submission-webhook.Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/hackstack-submission-webhook:${{ github.sha }}
                      ${{ secrets.DOCKERHUB_USERNAME }}/hackstack-submission-webhook:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build & Push web
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Docker/web.Dockerfile
                  push: true
                  tags: |
                      ${{ secrets.DOCKERHUB_USERNAME }}/hackstack-web:${{ github.sha }}
                      ${{ secrets.DOCKERHUB_USERNAME }}/hackstack-web:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
